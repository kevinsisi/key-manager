name: Deploy to Server via Tailscale

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  deploy:
    runs-on: [self-hosted, linux, arm64, rpi]
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -e

          retry_pull() {
            local max_attempts=3
            local attempt=1
            local delay=10

            while [ $attempt -le $max_attempts ]; do
              echo "Pulling Docker images (attempt $attempt/$max_attempts)..."
              if docker compose -f docker-compose.yml pull; then
                echo "Pull successful!"
                return 0
              fi

              if [ $attempt -lt $max_attempts ]; then
                echo "Pull failed, retrying in ${delay}s..."
                sleep $delay
                delay=$((delay * 2))
              fi
              attempt=$((attempt + 1))
            done

            echo "Pull failed after $max_attempts attempts"
            return 1
          }

          echo "Syncing docker-compose.yml..."
          cp docker-compose.yml "${DEPLOY_PATH}/docker-compose.yml"

          echo "Navigating to deployment directory..."
          cd "${DEPLOY_PATH}"

          retry_pull

          echo "Force removing any leftover containers..."
          docker rm -f key-manager 2>/dev/null || true

          echo "Stopping existing containers..."
          docker compose -f docker-compose.yml down --remove-orphans --volumes=false

          echo "Starting updated containers..."
          docker compose -f docker-compose.yml up -d --force-recreate

          echo "Cleaning up old images..."
          docker image prune -af --filter "until=24h" || true

          echo "Deployment completed successfully!"
          docker compose -f docker-compose.yml ps

      - name: Health Check
        run: |
          echo "Performing health check..."
          sleep 10
          curl -f http://localhost:7823/ || exit 1
          echo "Health check passed!"

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner**: self-hosted (rpi-matrix)" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.DOCKERHUB_USERNAME }}/key-manager:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Port**: 7823:7823" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Deployment failed! Please check the logs above." >> $GITHUB_STEP_SUMMARY
